<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Search — Entity Discovery Engine</title>
<style>
/* ── Reset & Root ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #07080d;
  --bg2:      #0d0f18;
  --bg3:      #13162199;
  --bg4:      #1a1d2e;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.11);
  --border3:  rgba(255,255,255,0.18);
  --text:     #e8eaf6;
  --text2:    #8890b0;
  --text3:    #454870;
  --accent:   #5c6bc0;
  --accent2:  #7986cb;
  --accent3:  #9fa8da;
  --glow:     rgba(92,107,192,0.18);
  --glow2:    rgba(92,107,192,0.08);
  --green:    #4caf80;
  --amber:    #f5a623;
  --red:      #ef5350;
  --tag-bg:   rgba(92,107,192,0.14);
  --tag-text: #9fa8da;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
  --font-sans: 'Inter', system-ui, sans-serif;
  --r: 10px;
  --r-sm: 6px;
}

/* ── Google Fonts ──────────────────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

body {
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.6;
  /* subtle grid pattern */
  background-image:
    linear-gradient(rgba(92,107,192,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(92,107,192,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── Scrollbar ─────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* ── Header ───────────────────────────────────────────────────────── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  background: rgba(7,8,13,0.92);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.logo {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent3);
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.logo-icon {
  width: 22px; height: 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}
.logo-sep { color: var(--text3); font-weight: 300; }

.header-badge {
  font-size: 10px;
  padding: 2px 8px;
  background: var(--tag-bg);
  color: var(--tag-text);
  border-radius: 99px;
  border: 1px solid rgba(92,107,192,0.2);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

.header-spacer { flex: 1; }

.header-note {
  font-size: 11px;
  color: var(--text3);
}

/* ── Layout ───────────────────────────────────────────────────────── */
.main {
  max-width: 1300px;
  margin: 0 auto;
  padding: 40px 32px 100px;
}

/* ── Hero ─────────────────────────────────────────────────────────── */
.hero {
  text-align: center;
  padding: 48px 0 36px;
}
.hero-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text) 60%, var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: 13px;
  color: var(--text2);
  font-weight: 400;
  font-family: var(--font-sans);
}

/* ── API Key Card ─────────────────────────────────────────────────── */
.key-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 18px 22px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.key-card-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}
.key-input-wrap {
  flex: 1;
  display: flex;
  gap: 10px;
  min-width: 200px;
}
.key-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  padding: 9px 14px;
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 12px;
  outline: none;
  transition: border-color .2s;
}
.key-input:focus { border-color: var(--accent); }
.key-input::placeholder { color: var(--text3); }
.key-btn {
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  padding: 9px 16px;
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.key-btn:hover { border-color: var(--accent); color: var(--accent3); }
.key-status {
  font-size: 11px;
  color: var(--green);
  flex-shrink: 0;
}
.key-status.missing { color: var(--amber); }

/* ── Search Section ───────────────────────────────────────────────── */
.search-section { margin-bottom: 28px; }

.section-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.search-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}
.search-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 16px 20px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 400;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow);
}
.search-input::placeholder { color: var(--text3); }
.search-input:disabled { opacity: 0.5; cursor: not-allowed; }

.run-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r);
  padding: 16px 32px;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, transform .1s, box-shadow .2s;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.run-btn:hover:not(:disabled) {
  background: #4a5ab0;
  box-shadow: 0 0 20px rgba(92,107,192,0.4);
}
.run-btn:active:not(:disabled) { transform: scale(0.98); }
.run-btn:disabled {
  background: var(--bg4);
  color: var(--text3);
  cursor: not-allowed;
}
.run-btn.running {
  background: var(--bg4);
  color: var(--accent3);
  border: 1px solid var(--accent);
}

.examples {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.chip {
  font-size: 11px;
  padding: 5px 13px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font-sans);
}
.chip:hover {
  border-color: var(--accent);
  color: var(--accent3);
  background: rgba(92,107,192,0.08);
}

/* ── Error Box ────────────────────────────────────────────────────── */
.error-box {
  background: rgba(239,83,80,0.08);
  border: 1px solid rgba(239,83,80,0.25);
  border-radius: var(--r);
  padding: 14px 20px;
  color: var(--red);
  font-size: 13px;
  margin-bottom: 20px;
}

/* ── Pipeline Progress ────────────────────────────────────────────── */
.progress-section {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 20px 24px;
  margin-bottom: 28px;
}
.progress-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
}

.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent2);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.steps { display: flex; flex-direction: column; gap: 10px; }

.step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--r-sm);
  background: var(--bg3);
  border: 1px solid var(--border);
  transition: all .2s;
  font-size: 12px;
}
.step.running {
  border-color: rgba(92,107,192,0.3);
  background: rgba(92,107,192,0.06);
}
.step.done {
  border-color: rgba(76,175,128,0.2);
  background: rgba(76,175,128,0.04);
}
.step.error {
  border-color: rgba(239,83,80,0.2);
  background: rgba(239,83,80,0.04);
}

.step-icon {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  margin-top: 1px;
}
.step-icon.running {
  border: 1.5px solid var(--border2);
  border-top-color: var(--accent2);
  animation: spin 0.7s linear infinite;
}
.step-icon.done {
  background: rgba(76,175,128,0.2);
  color: var(--green);
}
.step-icon.error {
  background: rgba(239,83,80,0.15);
  color: var(--red);
}
.step-icon.pending {
  border: 1.5px solid var(--border);
  color: var(--text3);
}

.step-body { flex: 1; }
.step-text { color: var(--text); font-weight: 500; margin-bottom: 2px; }
.step-meta { color: var(--text2); font-size: 11px; line-height: 1.4; }
.step-time {
  font-size: 10px;
  color: var(--text3);
  flex-shrink: 0;
  margin-top: 2px;
}

/* ── Pipeline diagram ──────────────────────────────────────────────── */
.pipeline-diagram {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.pipeline-node {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--bg3);
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
  transition: all .2s;
  flex-shrink: 0;
}
.pipeline-node.active {
  border-color: var(--accent);
  background: rgba(92,107,192,0.1);
  color: var(--accent3);
}
.pipeline-node.complete {
  border-color: rgba(76,175,128,0.3);
  background: rgba(76,175,128,0.06);
  color: var(--green);
}
.pipeline-arrow { color: var(--text3); font-size: 12px; flex-shrink: 0; }

/* ── Meta Row ─────────────────────────────────────────────────────── */
.meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 12px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 11px;
  color: var(--text2);
}
.meta-item { display: flex; align-items: center; gap: 6px; }
.meta-item b { color: var(--text); font-weight: 500; }
.meta-sep { color: var(--border3); }
.meta-badge {
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(92,107,192,0.12);
  color: var(--accent3);
  border: 1px solid rgba(92,107,192,0.2);
  font-size: 10px;
}

/* ── Results Section ──────────────────────────────────────────────── */
.results-section {
  animation: fadeUp .3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.results-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.results-title {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  flex: 1;
}
.results-count {
  font-size: 11px;
  color: var(--text2);
}

.filter-input {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  padding: 7px 14px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  outline: none;
  transition: border-color .2s;
  width: 200px;
}
.filter-input:focus { border-color: var(--accent); }
.filter-input::placeholder { color: var(--text3); }

/* Confidence filter buttons */
.conf-filter {
  display: flex;
  gap: 4px;
}
.conf-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 6px 12px;
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.conf-btn:hover, .conf-btn.active { border-color: var(--accent); color: var(--accent3); background: rgba(92,107,192,0.08); }

/* ── Table ────────────────────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--bg2);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
thead { position: sticky; top: 0; }
th {
  background: var(--bg4);
  color: var(--text2);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 11px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: color .15s;
}
th:hover { color: var(--accent3); }
th.sorted { color: var(--accent3); }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }

td {
  padding: 10px 14px;
  vertical-align: top;
  max-width: 280px;
}

/* ── Cell Types ───────────────────────────────────────────────────── */
.cell-empty { color: var(--text3); }
.cell-name {
  font-weight: 600;
  color: var(--text);
  font-size: 12px;
  line-height: 1.4;
}
.cell-desc {
  color: var(--text2);
  font-size: 11px;
  line-height: 1.5;
  font-family: var(--font-sans);
}
.cell-url {
  color: var(--accent3);
  text-decoration: none;
  font-size: 11px;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 160px;
}
.cell-url:hover { text-decoration: underline; }

.cell-tag {
  display: inline-block;
  padding: 2px 7px;
  background: var(--tag-bg);
  color: var(--tag-text);
  border-radius: 3px;
  font-size: 10px;
  margin: 2px 2px 0 0;
  border: 1px solid rgba(92,107,192,0.15);
}

.cell-number {
  font-weight: 600;
  color: var(--accent3);
  font-variant-numeric: tabular-nums;
}

mark {
  background: rgba(245,166,35,0.25);
  color: var(--amber);
  border-radius: 2px;
  padding: 0 1px;
}

.cell-source {
  max-width: 140px;
  overflow: hidden;
}
.cell-source a {
  color: var(--text2);
  text-decoration: none;
  font-size: 11px;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cell-source a:hover { color: var(--accent3); text-decoration: underline; }
.cell-source-domain {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── Confidence Badge ─────────────────────────────────────────────── */
.confidence {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
}
.conf-high { background: rgba(76,175,128,0.1); color: var(--green); border: 1px solid rgba(76,175,128,0.2); }
.conf-mid  { background: rgba(245,166,35,0.08); color: var(--amber); border: 1px solid rgba(245,166,35,0.18); }
.conf-low  { background: rgba(239,83,80,0.08); color: var(--red); border: 1px solid rgba(239,83,80,0.18); }
.conf-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}

/* ── Sort indicator ───────────────────────────────────────────────── */
.sort-arrow { margin-left: 4px; font-size: 9px; }

/* ── Export Bar ───────────────────────────────────────────────────── */
.export-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.export-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.export-btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  padding: 8px 16px;
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.export-btn:hover { border-color: var(--accent); color: var(--accent3); background: rgba(92,107,192,0.06); }

/* ── Sources Panel ────────────────────────────────────────────────── */
.sources-section {
  margin-top: 32px;
  border-top: 1px solid var(--border);
  padding-top: 24px;
}
.sources-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  margin-top: 14px;
}
.source-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  transition: border-color .15s;
}
.source-card:hover { border-color: var(--accent); }
.source-card-title {
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.source-card-url {
  font-size: 10px;
  color: var(--accent2);
  text-decoration: none;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  display: block;
  margin-bottom: 6px;
}
.source-card-url:hover { text-decoration: underline; }
.source-card-snippet {
  font-size: 11px;
  color: var(--text3);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  font-family: var(--font-sans);
}

/* ── JSON Modal ───────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(7,8,13,0.85);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  width: 100%;
  max-width: 780px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 12px; color: var(--text2); font-weight: 500; }
.modal-close {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all .15s;
}
.modal-close:hover { border-color: var(--accent); color: var(--accent3); }
.modal-body {
  overflow: auto;
  padding: 18px;
  flex: 1;
}
.modal-body pre {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  white-space: pre-wrap;
  word-break: break-all;
}

/* ── Responsive ───────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .main { padding: 24px 16px 80px; }
  .header { padding: 14px 16px; }
  .meta-row { gap: 6px; font-size: 10px; }
  .filter-input { width: 150px; }
  .hero-title { font-size: 20px; }
  .pipeline-diagram { display: none; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">⟳</div>
    agent<span class="logo-sep">//</span>search
  </div>
  <span class="header-badge">v2</span>
  <div class="header-spacer"></div>
  <span class="header-note">powered by Claude + web search</span>
</header>

<main class="main">

  <div class="hero">
    <h1 class="hero-title">Agentic Entity Discovery</h1>
    <p class="hero-sub">Natural language query → structured, source-traceable data table</p>
  </div>

  <!-- API Key -->
  <div class="key-card" id="key-card">
    <span class="key-card-label">API Key</span>
    <div class="key-input-wrap">
      <input class="key-input" id="key-input" type="password" placeholder="sk-ant-api..." autocomplete="off" />
      <button class="key-btn" onclick="saveKey()">Save</button>
      <button class="key-btn" onclick="clearKey()">Clear</button>
    </div>
    <span class="key-status missing" id="key-status">⚠ not set</span>
  </div>

  <!-- Serper Key (optional) -->
  <div class="key-card">
    <span class="key-card-label">Serper</span>
    <div class="key-input-wrap">
      <input class="key-input" id="serper-input" type="password"
        placeholder="serper.dev key (optional — faster search with location support)"
        autocomplete="off" />
      <button class="key-btn" onclick="saveSerperKey()">Save</button>
    </div>
    <span class="key-status missing" id="serper-status">optional</span>
  </div>

  <!-- Location -->
  <div class="key-card">
    <span class="key-card-label">Location</span>
    <div class="key-input-wrap">
      <input class="key-input" id="location-input" type="text"
        placeholder="e.g. Amherst, MA (optional — improves 'near me' queries)"
        oninput="saveLocation()" />
    </div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <div class="section-label">query</div>
    <div class="search-row">
      <input
        class="search-input"
        id="search-input"
        placeholder="e.g. AI startups in healthcare, top pizza places in Brooklyn, open source database tools..."
        onkeydown="handleKey(event)"
      />
      <button class="run-btn" id="run-btn" onclick="handleSearch()">Run →</button>
    </div>
    <div class="examples" id="examples"></div>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box" style="display:none"></div>

  <!-- Progress -->
  <div class="progress-section" id="progress-section" style="display:none">
    <div class="progress-header">
      <div class="spinner"></div>
      <span id="progress-label">Running agent pipeline...</span>
    </div>
    <div class="pipeline-diagram" id="pipeline-diagram"></div>
    <div class="steps" id="steps-list"></div>
  </div>

  <!-- Results -->
  <div id="results-container" style="display:none">

    <div class="meta-row" id="meta-row"></div>

    <div class="results-section">
      <div class="results-toolbar">
        <span class="results-title">// discovered entities</span>
        <input class="filter-input" id="filter-input" placeholder="filter results..." oninput="renderTable()" />
        <div class="conf-filter">
          <button class="conf-btn active" id="cf-all"    onclick="setConfFilter('all')">All</button>
          <button class="conf-btn"        id="cf-high"   onclick="setConfFilter('high')">High</button>
          <button class="conf-btn"        id="cf-mid"    onclick="setConfFilter('mid')">Mid</button>
          <button class="conf-btn"        id="cf-low"    onclick="setConfFilter('low')">Low</button>
        </div>
        <span class="results-count" id="results-count"></span>
      </div>

      <div class="table-wrap">
        <table id="entity-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <div class="export-bar">
        <span class="export-label">Export</span>
        <button class="export-btn" onclick="exportJSON()">⬇ JSON</button>
        <button class="export-btn" onclick="exportCSV()">⬇ CSV</button>
        <button class="export-btn" onclick="showJSONModal()">{ } View JSON</button>
      </div>
    </div>

    <div class="sources-section" id="sources-section">
      <div class="section-label">sources</div>
      <div class="sources-grid" id="sources-grid"></div>
    </div>
  </div>

</main>

<!-- JSON Modal -->
<div class="modal-overlay" id="json-modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">// results.json</span>
      <button class="modal-close" onclick="closeModal()">close</button>
    </div>
    <div class="modal-body">
      <pre id="json-preview"></pre>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════
const CLAUDE_MODEL      = 'claude-sonnet-4-20250514';
const MAX_CONTENT_CHARS = 24000;
const PAGE_CHAR_LIMIT   = 5000;
const MAX_TOKENS        = { schema: 1500, search: 5000, extract: 8192 };

const EXAMPLES = [
  'AI startups in healthcare',
  'top pizza places in Brooklyn',
  'open source database tools',
  'climate tech companies Series A',
  'best productivity apps 2025',
  'electric vehicle manufacturers',
];

const PIPELINE_STAGES = [
  { id: 'plan',    label: 'Schema Planner' },
  { id: 'search',  label: 'Web Search'     },
  { id: 'scrape',  label: 'Page Scraper'   },
  { id: 'extract', label: 'Entity Extract' },
  { id: 'enrich',  label: 'Enrichment'     },
];

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let state = {
  running: false,
  result: null,
  steps: [],
  sortKey: null,
  sortAsc: true,
  confFilter: 'all',
};

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Examples
  const ex = document.getElementById('examples');
  EXAMPLES.forEach(e => {
    const c = document.createElement('span');
    c.className = 'chip';
    c.textContent = e;
    c.onclick = () => { document.getElementById('search-input').value = e; };
    ex.appendChild(c);
  });

  // Pipeline diagram
  const diag = document.getElementById('pipeline-diagram');
  PIPELINE_STAGES.forEach((s, i) => {
    const node = document.createElement('span');
    node.className = 'pipeline-node';
    node.id = `pn-${s.id}`;
    node.textContent = s.label;
    diag.appendChild(node);
    if (i < PIPELINE_STAGES.length - 1) {
      const arr = document.createElement('span');
      arr.className = 'pipeline-arrow';
      arr.textContent = '→';
      diag.appendChild(arr);
    }
  });

  // Restore key
  const key = sessionStorage.getItem('anthropic_key') || '';
  if (key) {
    document.getElementById('key-input').value = key;
    updateKeyStatus(true);
  }

  // Restore location
  const loc = sessionStorage.getItem('user_location') || '';
  if (loc) document.getElementById('location-input').value = loc;

  // Restore Serper key
  const sk = sessionStorage.getItem('serper_key') || '';
  if (sk) {
    document.getElementById('serper-input').value = sk;
    document.getElementById('serper-status').textContent = '✓ set';
    document.getElementById('serper-status').className = 'key-status';
  }
});

// ════════════════════════════════════════════════════════
//  KEY MANAGEMENT
// ════════════════════════════════════════════════════════
function saveKey() {
  const v = document.getElementById('key-input').value.trim();
  if (v) { sessionStorage.setItem('anthropic_key', v); updateKeyStatus(true); }
}
function clearKey() {
  sessionStorage.removeItem('anthropic_key');
  document.getElementById('key-input').value = '';
  updateKeyStatus(false);
}
function getKey() { return sessionStorage.getItem('anthropic_key') || document.getElementById('key-input').value.trim(); }
function updateKeyStatus(ok) {
  const el = document.getElementById('key-status');
  el.textContent = ok ? '✓ ready' : '⚠ not set';
  el.className = `key-status ${ok ? '' : 'missing'}`;
}

function saveLocation() {
  const v = document.getElementById('location-input').value.trim();
  if (v) sessionStorage.setItem('user_location', v);
  else sessionStorage.removeItem('user_location');
}
function getLocation() {
  return sessionStorage.getItem('user_location') || document.getElementById('location-input').value.trim();
}

function saveSerperKey() {
  const v = document.getElementById('serper-input').value.trim();
  if (v) {
    sessionStorage.setItem('serper_key', v);
    document.getElementById('serper-status').textContent = '✓ set';
    document.getElementById('serper-status').className = 'key-status';
  }
}
function getSerperKey() { return sessionStorage.getItem('serper_key') || document.getElementById('serper-input').value.trim(); }

// ════════════════════════════════════════════════════════
//  SEARCH HANDLER
// ════════════════════════════════════════════════════════
function handleKey(e) { if (e.key === 'Enter') handleSearch(); }

async function handleSearch() {
  if (state.running) return;
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  const apiKey = getKey();
  if (!apiKey) { showError('Please enter your Anthropic API key above.'); return; }

  state.running = true;
  state.steps = [];
  state.result = null;
  state.sortKey = null;
  state.confFilter = 'all';

  // UI Reset
  document.getElementById('run-btn').textContent = '⟳ Running...';
  document.getElementById('run-btn').className = 'run-btn running';
  document.getElementById('run-btn').disabled = true;
  document.getElementById('search-input').disabled = true;
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('results-container').style.display = 'none';
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('steps-list').innerHTML = '';
  PIPELINE_STAGES.forEach(s => {
    const el = document.getElementById(`pn-${s.id}`);
    if (el) { el.className = 'pipeline-node'; }
  });
  setConfFilter('all');

  const onStep = (step) => {
    const idx = state.steps.findIndex(s => s.id === step.id);
    if (idx >= 0) state.steps[idx] = step;
    else state.steps.push(step);
    renderProgress();
    updateDiagram(step);
  };

  try {
    const location = getLocation();
    const serperKey = getSerperKey();
    const data = await runAgenticSearch(query, { apiKey, onStep, serperKey: serperKey || undefined, location: location || undefined });
    state.result = data;
    document.getElementById('progress-section').style.display = 'none';
    renderResults(data);
  } catch (err) {
    showError(err.message || String(err));
    document.getElementById('progress-section').style.display = 'none';
  } finally {
    state.running = false;
    document.getElementById('run-btn').textContent = 'Run →';
    document.getElementById('run-btn').className = 'run-btn';
    document.getElementById('run-btn').disabled = false;
    document.getElementById('search-input').disabled = false;
  }
}

function updateDiagram(step) {
  PIPELINE_STAGES.forEach(s => {
    const el = document.getElementById(`pn-${s.id}`);
    if (!el) return;
    const found = state.steps.find(x => x.id === s.id);
    if (!found) { el.className = 'pipeline-node'; return; }
    if (found.status === 'running') el.className = 'pipeline-node active';
    else if (found.status === 'done') el.className = 'pipeline-node complete';
  });
}

// ════════════════════════════════════════════════════════
//  PIPELINE RENDERING
// ════════════════════════════════════════════════════════
function renderProgress() {
  const list = document.getElementById('steps-list');
  list.innerHTML = '';
  state.steps.forEach(step => {
    const div = document.createElement('div');
    div.className = `step ${step.status}`;

    const iconDiv = document.createElement('div');
    iconDiv.className = `step-icon ${step.status}`;
    if (step.status === 'done') iconDiv.textContent = '✓';
    else if (step.status === 'error') iconDiv.textContent = '✗';
    else if (step.status === 'pending') iconDiv.textContent = '○';

    const body = document.createElement('div');
    body.className = 'step-body';

    const txt = document.createElement('div');
    txt.className = 'step-text';
    txt.textContent = step.text;
    body.appendChild(txt);

    if (step.meta) {
      const meta = document.createElement('div');
      meta.className = 'step-meta';
      meta.textContent = step.meta;
      body.appendChild(meta);
    }

    if (step.elapsed) {
      const t = document.createElement('div');
      t.className = 'step-time';
      t.textContent = `${(step.elapsed / 1000).toFixed(1)}s`;
      div.appendChild(iconDiv);
      div.appendChild(body);
      div.appendChild(t);
    } else {
      div.appendChild(iconDiv);
      div.appendChild(body);
    }

    list.appendChild(div);
  });
}

// ════════════════════════════════════════════════════════
//  RESULTS RENDERING
// ════════════════════════════════════════════════════════
function renderResults(data) {
  // Meta row
  const meta = document.getElementById('meta-row');
  meta.innerHTML = `
    <span class="meta-item"><b>"${escHtml(data.query)}"</b></span>
    <span class="meta-sep">·</span>
    <span class="meta-item">⏱ <b>${(data.elapsed / 1000).toFixed(1)}s</b></span>
    <span class="meta-sep">·</span>
    <span class="meta-item">📄 <b>${data.sources.length}</b> sources</span>
    <span class="meta-sep">·</span>
    <span class="meta-item">🔍 <b>${data.entities.length}</b> entities</span>
    <span class="meta-sep">·</span>
    <span class="meta-badge">${escHtml(data.schema.entity_type)}</span>
  `;

  // Table header
  const thead = document.getElementById('table-head');
  thead.innerHTML = '';
  const tr = document.createElement('tr');
  [...data.schema.columns, { key: '_confidence', label: 'Confidence' }, { key: '_source', label: 'Source' }]
    .forEach(col => {
      const th = document.createElement('th');
      if (col.key !== '_source') {
        th.onclick = () => handleSort(col.key);
        th.title = `Sort by ${col.label}`;
      }
      const arrow = state.sortKey === col.key ? `<span class="sort-arrow">${state.sortAsc ? '▲' : '▼'}</span>` : '';
      th.innerHTML = escHtml(col.label) + arrow;
      if (state.sortKey === col.key) th.className = 'sorted';
      tr.appendChild(th);
    });
  thead.appendChild(tr);

  // Sources grid
  const grid = document.getElementById('sources-grid');
  grid.innerHTML = '';
  (data.sources || []).forEach(src => {
    const card = document.createElement('div');
    card.className = 'source-card';
    let host = '';
    try { host = new URL(src.url).hostname; } catch {}
    card.innerHTML = `
      <div class="source-card-title">${escHtml(src.title || host)}</div>
      <a class="source-card-url" href="${escHtml(src.url)}" target="_blank" rel="noreferrer">${escHtml(src.url.slice(0, 60))}</a>
      ${src.snippet ? `<div class="source-card-snippet">${escHtml(src.snippet)}</div>` : ''}
    `;
    grid.appendChild(card);
  });

  document.getElementById('results-container').style.display = 'block';
  renderTable();
}

function renderTable() {
  if (!state.result) return;
  const { schema, entities } = state.result;
  const filterQ = document.getElementById('filter-input').value.toLowerCase();
  const confF   = state.confFilter;

  let rows = entities;
  if (filterQ) rows = rows.filter(e => JSON.stringify(e).toLowerCase().includes(filterQ));
  if (confF !== 'all') rows = rows.filter(e => (e._confidence || 'mid') === confF);
  if (state.sortKey) {
    rows = [...rows].sort((a, b) => {
      let av = a[state.sortKey], bv = b[state.sortKey];
      if (Array.isArray(av)) av = av.join(' ');
      if (Array.isArray(bv)) bv = bv.join(' ');
      av = String(av ?? ''); bv = String(bv ?? '');
      return state.sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  document.getElementById('results-count').textContent = `${rows.length} result${rows.length !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  rows.forEach(entity => {
    const tr = document.createElement('tr');

    // Data columns
    schema.columns.forEach(col => {
      const td = document.createElement('td');
      td.innerHTML = renderCell(entity[col.key], col.type, col.key, filterQ);
      tr.appendChild(td);
    });

    // Confidence
    const confTd = document.createElement('td');
    const conf = entity._confidence || 'mid';
    confTd.innerHTML = `<span class="confidence conf-${conf}"><span class="conf-dot"></span>${conf}</span>`;
    tr.appendChild(confTd);

    // Source
    const srcTd = document.createElement('td');
    const url = entity.source_url || '';
    const title = entity.source_title || '';
    if (url) {
      let host = '';
      try { host = new URL(url).hostname; } catch { host = url.slice(0, 30); }
      srcTd.innerHTML = `
        <div class="cell-source">
          <a href="${escHtml(url)}" target="_blank" rel="noreferrer">${escHtml(title || host)}</a>
          ${title ? `<div class="cell-source-domain">${escHtml(host)}</div>` : ''}
        </div>`;
    } else {
      srcTd.innerHTML = '<span class="cell-empty">—</span>';
    }
    tr.appendChild(srcTd);

    tbody.appendChild(tr);
  });
}

function renderCell(value, type, key, highlight) {
  if (value == null || value === '' || value === 'null') {
    return '<span class="cell-empty">—</span>';
  }

  if (type === 'url' || (typeof value === 'string' && value.startsWith('http'))) {
    const label = value.replace(/^https?:\/\//, '').replace(/\/$/, '').slice(0, 45);
    return `<a class="cell-url" href="${escHtml(value)}" target="_blank" rel="noreferrer">${escHtml(label)}</a>`;
  }

  if (type === 'tags' || Array.isArray(value)) {
    const tags = Array.isArray(value) ? value : value.toString().split(/[,;]+/).map(t => t.trim()).filter(Boolean);
    return tags.map(t => `<span class="cell-tag">${escHtml(t)}</span>`).join('');
  }

  if (type === 'number') {
    return `<span class="cell-number">${escHtml(String(value))}</span>`;
  }

  const text = String(value);
  if (key === 'name') return `<span class="cell-name">${highlight ? hlText(text, highlight) : escHtml(text)}</span>`;
  if (key === 'description' || key === 'summary' || key === 'overview') {
    return `<span class="cell-desc">${highlight ? hlText(text, highlight) : escHtml(text)}</span>`;
  }
  return highlight ? hlText(text, highlight) : escHtml(text);
}

function hlText(text, query) {
  if (!query) return escHtml(text);
  const re = new RegExp(`(${escRegex(query)})`, 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

function handleSort(key) {
  if (state.sortKey === key) state.sortAsc = !state.sortAsc;
  else { state.sortKey = key; state.sortAsc = true; }
  renderResults(state.result); // re-render header + table
}

function setConfFilter(v) {
  state.confFilter = v;
  ['all','high','mid','low'].forEach(k => {
    const el = document.getElementById(`cf-${k}`);
    if (el) el.className = `conf-btn${k === v ? ' active' : ''}`;
  });
  renderTable();
}

// ════════════════════════════════════════════════════════
//  EXPORT
// ════════════════════════════════════════════════════════
function exportJSON() {
  if (!state.result) return;
  download(
    new Blob([JSON.stringify(state.result.entities, null, 2)], { type: 'application/json' }),
    'agentic-search-results.json'
  );
}

function exportCSV() {
  if (!state.result) return;
  const { schema, entities } = state.result;
  const cols = schema.columns.map(c => c.key);
  const header = [...cols, '_confidence', 'source_url', 'source_title'].join(',');
  const rows = entities.map(e =>
    [...cols.map(k => csvCell(e[k])), csvCell(e._confidence), csvCell(e.source_url), csvCell(e.source_title)].join(',')
  );
  download(new Blob([[header, ...rows].join('\n')], { type: 'text/csv' }), 'agentic-search-results.csv');
}

function csvCell(v) {
  if (v == null) return '""';
  const s = Array.isArray(v) ? v.join('; ') : String(v);
  return JSON.stringify(s);
}

function download(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

function showJSONModal() {
  if (!state.result) return;
  document.getElementById('json-preview').textContent = JSON.stringify(state.result.entities, null, 2);
  document.getElementById('json-modal').style.display = 'flex';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('json-modal')) {
    document.getElementById('json-modal').style.display = 'none';
  }
}

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '// error: ' + msg;
  el.style.display = 'block';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ════════════════════════════════════════════════════════
//  AGENTIC PIPELINE
// ════════════════════════════════════════════════════════

/**
 * runAgenticSearch — 5-stage pipeline
 *
 * Stage 1: planSchema     → domain-specific schema + search queries
 * Stage 2: searchWeb      → discover sources via Claude web_search tool
 * Stage 3: scrapePages    → fetch + summarize page content (via search agent)
 * Stage 4: extractEntities→ LLM structured extraction with source attribution
 * Stage 5: enrichEntities → dedup, confidence scoring, normalization
 */
async function runAgenticSearch(query, { apiKey, onStep, serperKey, location }) {
  const t0 = Date.now();
  const stepTimers = {};

  const step = (id, text, status, meta) => {
    if (status === 'running') stepTimers[id] = Date.now();
    const elapsed = status === 'done' && stepTimers[id] ? Date.now() - stepTimers[id] : null;
    onStep?.({ id, text, status, meta, elapsed });
  };

  // ── Stage 1: Schema ────────────────────────────────────────
  step('plan', 'Planning extraction schema…', 'running');
  const schema = await planSchema(query, apiKey, location);
  step('plan', `Schema ready: ${schema.entity_type} · ${schema.columns.length} columns`, 'done',
    `Queries: ${schema.search_queries.slice(0,2).join(' | ')}`);

  // ── Stage 2: Web Search ────────────────────────────────────
  step('search', 'Discovering web sources…', 'running');
  const sources = await searchWeb(query, schema, apiKey, serperKey, location);
  step('search', `Found ${sources.length} sources`, 'done',
    sources.slice(0,3).map(s => s.title).filter(Boolean).join(', ') || 'sources ready');

  // ── Stage 3: Page Scraping (Jina Reader — parallel, no LLM)
  step('scrape', 'Fetching page content…', 'running');
  const pages = await scrapePages(sources);
  const totalChars = pages.reduce((s, p) => s + (p.content?.length || 0), 0);
  step('scrape', `Processed ${pages.length} pages`, 'done',
    `~${Math.round(totalChars / 1000)}k chars extracted`);

  // ── Stage 4: Entity Extraction ─────────────────────────────
  step('extract', 'Extracting structured entities…', 'running');
  const rawEntities = await extractEntities(pages, schema, query, apiKey);
  step('extract', `Extracted ${rawEntities.length} raw entities`, 'done', 'applying deduplication…');

  // ── Stage 5: Enrichment ────────────────────────────────────
  step('enrich', 'Scoring confidence and finalizing…', 'running');
  const entities = enrichEntities(rawEntities, schema);
  const elapsed = Date.now() - t0;
  step('enrich', `Done — ${entities.length} entities ready`, 'done',
    `Total time: ${(elapsed / 1000).toFixed(1)}s`);

  return { query, schema, entities, sources, pages, elapsed };
}

// ── Stage 1: Schema Planner ────────────────────────────────────────
async function planSchema(query, apiKey, location) {
  const locationCtx = location
    ? `\nUser location: ${location}. Replace "near me", "nearby", or location-relative phrases in search queries with "${location}".`
    : '';

  const text = await callClaude({
    apiKey,
    maxTokens: MAX_TOKENS.schema,
    system: `You are an expert data schema designer. Given a search query, design an optimal extraction schema.
Output ONLY valid JSON (no markdown, no backticks, no explanation):
{
  "entity_type": "concise description of what entities we are finding",
  "columns": [
    { "key": "name", "label": "Name", "type": "text", "description": "primary name of the entity" },
    { "key": "...", "label": "...", "type": "text|url|tags|number", "description": "..." }
  ],
  "search_queries": ["diverse query 1", "query 2", "query 3"],
  "extraction_prompt": "2-3 sentence instructions for extracting these entities accurately"
}

Rules:
- ALWAYS include these first 3 columns: name, description, source_url
- Add 3-6 domain-specific columns. ALWAYS include quantitative metrics when available. Examples:
  - Companies/startups: founded, headquarters, funding_stage, total_funding, employee_count, website, focus_area
  - Restaurants/food: cuisine, price_range, rating, review_count, neighborhood, address
  - Software/tools: license, language, github_stars, category, website, maintainer
  - People: role, organization, expertise, location, social_url
- Column keys: snake_case. type "tags" = array of strings (e.g. technologies, categories)
- search_queries: 3 diverse queries maximizing source variety (broad, specific, listicle/directory)
- extraction_prompt: domain-specific instructions on what qualifies as an entity and field semantics`,
    messages: [{ role: 'user', content: `Query: "${query}"${locationCtx}` }],
  });

  return safeParseJSON(text, () => {
    throw new Error(`Schema planner returned unparseable output: ${text.slice(0, 200)}`);
  });
}

// ── Stage 2: Web Search (SerpAPI → Claude fallback) ───────────────
async function searchWeb(query, schema, apiKey, serperKey, location) {
  if (serperKey) {
    try {
      const results = await searchViaSerper(schema.search_queries || [query], serperKey, location);
      if (results.length > 0) return results;
    } catch {
      // CORS (browser) or network error — fall back to Claude web_search
    }
  }

  const text = await callClaude({
    apiKey,
    maxTokens: MAX_TOKENS.search,
    useWebSearch: true,
    system: `You are a research agent. Search the web to discover high-quality, diverse sources about the given topic.
Use ALL 3 provided search queries. After searching, output ONLY a JSON array (no markdown):
[{ "title": "...", "url": "https://...", "snippet": "brief 1-2 sentence description" }]
Goals:
- Find 6-12 sources
- Prioritize: authoritative directories, curated lists, industry databases, review sites, news coverage
- Maximize diversity: different domains, perspectives, date ranges
- Exclude paywalled sources when possible`,
    messages: [{
      role: 'user',
      content: `Topic: "${query}"\n\nSearch queries to use:\n${schema.search_queries.map((q,i) => `${i+1}. ${q}`).join('\n')}`,
    }],
  });

  const results = safeParseJSON(text, () => []);
  if (!Array.isArray(results) || results.length === 0) {
    return [{ title: query, url: `https://www.google.com/search?q=${encodeURIComponent(query)}`, snippet: '' }];
  }
  return results.filter(r => r?.url?.startsWith('http')).slice(0, 12);
}

async function searchViaSerper(queries, apiKey, location) {
  const seen = new Set();
  const results = [];

  for (const q of queries.slice(0, 3)) {
    const body = { q, num: 8 };
    if (location) body.location = location;

    const res = await fetch('https://google.serper.dev/search', {
      method: 'POST',
      headers: { 'X-API-KEY': apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`Serper ${res.status}`);
    const data = await res.json();

    for (const r of (data.organic || [])) {
      if (r.link && !seen.has(r.link)) {
        seen.add(r.link);
        results.push({ title: r.title || '', url: r.link, snippet: r.snippet || '' });
      }
    }
  }

  return results.slice(0, 15);
}

// ── Stage 3: Page Scraper (Jina Reader — parallel, no LLM) ────────
async function scrapePages(sources) {
  const results = await Promise.allSettled(
    sources.slice(0, 10).map(async (s) => {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        try {
          const res = await fetch(`https://r.jina.ai/${s.url}`, {
            headers: { Accept: 'text/plain' },
            signal: controller.signal,
          });
          if (!res.ok) return null;
          const text = await res.text();
          return {
            url: s.url,
            title: s.title || text.split('\n')[0]?.slice(0, 100) || 'Untitled',
            snippet: s.snippet || '',
            content: text.slice(0, PAGE_CHAR_LIMIT),
          };
        } finally {
          clearTimeout(timeout);
        }
      } catch {
        return null;
      }
    })
  );

  const pages = results
    .filter(r => r.status === 'fulfilled' && r.value && r.value.content?.length > 50)
    .map(r => r.value);

  if (pages.length === 0) {
    return sources.map(s => ({ url: s.url, title: s.title, snippet: s.snippet || '', content: s.snippet || s.title }));
  }
  return pages;
}

// ── Stage 4: Entity Extractor ──────────────────────────────────────
async function extractEntities(pages, schema, query, apiKey) {
  const colsDesc = schema.columns
    .map(c => `  - ${c.key} (${c.type}): ${c.description}`)
    .join('\n');

  const exampleObj = Object.fromEntries(
    schema.columns.map(c => [c.key, c.type === 'tags' ? ['tag1','tag2'] : c.type === 'number' ? 0 : 'value or null'])
  );
  exampleObj.source_url = 'https://...';
  exampleObj.source_title = 'Page Title';

  const taggedContent = pages
    .map(p => {
      let block = `=== SOURCE: ${p.url} ===\nTitle: ${p.title}`;
      if (p.snippet) block += `\nSnippet: ${p.snippet}`;
      block += `\n${p.content}`;
      return block;
    })
    .join('\n\n')
    .slice(0, MAX_CONTENT_CHARS);

  const text = await callClaude({
    apiKey,
    maxTokens: MAX_TOKENS.extract,
    system: `You are a precision data extraction agent. ${schema.extraction_prompt}

Extract entities from the content and output ONLY a valid JSON array (no markdown, no explanation):
[${JSON.stringify(exampleObj, null, 2)}]

Column definitions:
${colsDesc}

STRICT rules:
- Extract ALL distinct entities mentioned in the source content — be thorough, aim for 10-25 entities
- For each entity, fill in every field where data IS present in the source text
- For number fields: extract from any textual format (e.g., "4.6 stars" → 4.6, "1,523 reviews" → 1523, "$$$" → 3, "$25-35" → 30)
- Use null ONLY when a field's data is genuinely not present — do NOT leave a field null if the source mentions it in any format
- NEVER invent or hallucinate values not supported by the source text
- source_url MUST be copied verbatim from a "=== SOURCE: url ===" header
- source_title MUST match the "Title:" field under that source header
- type "tags" → JSON array of strings
- type "url" → full https:// URL or null
- Deduplicate: if the same entity appears in multiple sources, merge all available data into one record
- Do not skip entities just because some fields are missing — partial data is valuable`,
    messages: [{
      role: 'user',
      content: `Query: "${query}"\n\nSource Content:\n${taggedContent}\n\nExtract ${schema.entity_type}:`,
    }],
  });

  const entities = safeParseJSON(text, () => []);
  if (!Array.isArray(entities)) throw new Error('Extractor returned non-array');
  return entities;
}

// ── Stage 5: Enrichment (quality-aware scoring) ───────────────────
function enrichEntities(entities, schema) {
  const seen = new Set();

  const ratingCols = schema.columns.filter(c =>
    c.type === 'number' && /rating|score/i.test(c.key)
  );
  const popularityCols = schema.columns.filter(c =>
    c.type === 'number' && /review|count|votes|popularity|funding|revenue|users|downloads/i.test(c.key)
  );
  const starsCols = schema.columns.filter(c =>
    c.type === 'number' && /stars/i.test(c.key) && !ratingCols.includes(c) && !popularityCols.includes(c)
  );
  const hasQualitySignals = ratingCols.length + popularityCols.length + starsCols.length > 0;

  return entities
    .filter(e => {
      const key = String(e.name || '').toLowerCase().trim();
      if (!key || key === 'null' || seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .map(e => {
      schema.columns.filter(c => c.type === 'tags').forEach(c => {
        if (typeof e[c.key] === 'string') {
          e[c.key] = e[c.key].split(/[,;]+/).map(t => t.trim()).filter(Boolean);
        }
      });

      const filled = schema.columns.filter(c => {
        const v = e[c.key];
        return v != null && v !== '' && v !== 'null' && !(Array.isArray(v) && v.length === 0);
      }).length;
      const completeness = filled / schema.columns.length;

      let qualitySum = 0, qualityCount = 0;

      for (const c of ratingCols) {
        const v = Number(e[c.key]);
        if (!isNaN(v) && v > 0) { qualitySum += Math.min(v / 5, 1); qualityCount++; }
      }
      for (const c of popularityCols) {
        const v = Number(e[c.key]);
        if (!isNaN(v) && v > 0) { qualitySum += Math.min(Math.log10(v + 1) / 5, 1); qualityCount++; }
      }
      for (const c of starsCols) {
        const v = Number(e[c.key]);
        if (!isNaN(v) && v > 0) {
          if (v <= 5) qualitySum += v / 5;
          else qualitySum += Math.min(Math.log10(v + 1) / 5, 1);
          qualityCount++;
        }
      }

      const qualityScore = qualityCount > 0 ? qualitySum / qualityCount : 0;

      let score;
      if (hasQualitySignals) {
        if (qualityCount > 0) {
          score = 0.35 * completeness + 0.65 * qualityScore;
        } else {
          score = completeness * 0.5;
        }
      } else {
        score = completeness;
      }

      return {
        ...e,
        _confidence: score >= 0.5 ? 'high' : score >= 0.25 ? 'mid' : 'low',
        _score: Math.round(score * 100) / 100,
      };
    })
    .sort((a, b) => b._score - a._score);
}

// ════════════════════════════════════════════════════════
//  CLAUDE API CLIENT
// ════════════════════════════════════════════════════════
async function callClaude({ apiKey, system, messages, maxTokens = 2000, useWebSearch = false }) {
  const body = {
    model: CLAUDE_MODEL,
    max_tokens: maxTokens,
    system,
    messages,
  };

  if (useWebSearch) {
    body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
  }

  const headers = {
    'Content-Type': 'application/json',
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true',
  };
  if (apiKey) headers['x-api-key'] = apiKey;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers,
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Anthropic API ${res.status}: ${res.statusText}`);
  }

  const data = await res.json();
  // Collect all text blocks (web search responses may interleave text + tool_result blocks)
  return data.content
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('');
}

// ════════════════════════════════════════════════════════
//  JSON PARSER (robust)
// ════════════════════════════════════════════════════════
function safeParseJSON(text, fallbackFn) {
  const cleaned = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
  // Try array
  const arrM = cleaned.match(/\[[\s\S]*\]/);
  if (arrM) { try { return JSON.parse(arrM[0]); } catch {} }
  // Try object
  const objM = cleaned.match(/\{[\s\S]*\}/);
  if (objM) { try { return JSON.parse(objM[0]); } catch {} }
  // Fallback
  return fallbackFn ? fallbackFn() : null;
}
